swagger: '2.0'
info:
  title: MiBackEndLoreal_v2
  description: >
    Conector mínimo para pruebas: /health (público), /api/ping (protegido),
    /api/users (protegido).
  version: 1.0.0
host: backend-apiv4-production.up.railway.app
basePath: /
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json

paths:
  /health:
    get:
      tags: [Salud]
      summary: Health-check
      description: 'Público: verifica que el servidor está operativo.'
      operationId: health
      x-ms-visibility: important
      security: []
      responses:
        '200':
          description: OK
          schema:
            type: object
            properties:
              ok: { type: boolean }
              msg: { type: string }
            required: [ok, msg]
          examples:
            application/json: { ok: true, msg: Servidor operativo }

  /api/ping:
    get:
      tags: [Salud]
      summary: Ping protegido
      description: Protegido por API Key; responde pong.
      operationId: ping_protegido
      x-ms-visibility: important
      responses:
        '200':
          description: OK
          schema:
            type: object
            properties:
              ok: { type: boolean }
              msg: { type: string }
            required: [ok, msg]
          examples:
            application/json: { ok: true, msg: pong }

  /api/users:
    get:
      tags: [Usuarios]
      summary: Listar usuarios
      description: Devuelve la lista de usuarios (cliente_usuario).
      operationId: users_list
      x-ms-visibility: important
      responses:
        '200':
          description: OK
          schema:
            type: array
            items: { $ref: '#/definitions/User' }
        '401': { description: No autorizado, schema: { $ref: '#/definitions/ErrorResponse' } }
        '500': { description: Error interno, schema: { $ref: '#/definitions/ErrorResponse' } }
    post:
      tags: [Usuarios]
      summary: Crea un nuevo usuario
      description: crear un nuevo registro de usuario en la tabla de cliente_usuario
      operationId: users_insert
      parameters:
        - name: body
          in: body
          required: true
          schema: { $ref: '#/definitions/UserUpdate' }
      responses:
        '201':
          description: OK
          schema: { $ref: '#/definitions/User' } # devuelve User con id_usuario
        '400': { description: Datos inválidos, schema: { $ref: '#/definitions/ErrorResponse' } }
        '401': { description: No autorizado, schema: { $ref: '#/definitions/ErrorResponse' } }
        '409': { description: email ya existe, schema: { $ref: '#/definitions/ErrorResponse' } }
        '500': { description: Error creando usuario, schema: { $ref: '#/definitions/ErrorResponse' } }

  /api/users/email/{email}:
    get:
      tags: [Usuarios]
      summary: Obtener usuario por email
      operationId: users_getByEmail
      parameters:
        - in: path
          name: email
          required: true
          type: string
      responses:
        '200': { description: OK, schema: { $ref: '#/definitions/User' } }
        '401': { description: No autorizado, schema: { $ref: '#/definitions/ErrorResponse' } }
        '404': { description: Usuario no encontrado, schema: { $ref: '#/definitions/ErrorResponse' } }

  /api/productos-db:
    get:
      tags: [Productos]
      summary: Listar productos
      operationId: productos_list_old
      responses:
        '200':
          description: OK
          schema:
            type: array
            items: { $ref: '#/definitions/Producto' }

  /api/productos-db/id:
    get:
      tags: [Productos]
      summary: Listar productos incluido Id
      operationId: productos_list
      responses:
        '200':
          description: OK
          schema:
            type: array
            items: { $ref: '#/definitions/ProductoId' }

  /api/productos-db/id/{id_producto}:
    get:
      tags: [Productos]
      summary: Obtener producto por ID
      operationId: producto_getById
      description: Devuelve el registro de un producto (buscado por Id).
      parameters:
        - name: id_producto
          in: path
          required: true
          type: integer
          format: int32
      responses:
        '200': { description: OK Producto encontrado, schema: { $ref: '#/definitions/ProductoId' } }
        '401': { description: No autorizado, schema: { $ref: '#/definitions/ErrorResponse' } }
        '404': { description: Producto  no encontrado, schema: { $ref: '#/definitions/ErrorResponse' } }

  /api/users/{id_usuario}:
    get:
      tags: [Usuarios]
      operationId: users_getById
      summary: Obtener usuario por Id
      description: Devuelve el registro de un usuario (buscado por Id).
      parameters:
        - name: id_usuario
          in: path
          required: true
          type: integer
          format: int32
      responses:
        '200': { description: Usuario encontrado, schema: { $ref: '#/definitions/User' } } # User (con id)
        '401': { description: No autorizado, schema: { $ref: '#/definitions/ErrorResponse' } }
        '404': { description: Usuario no encontrado, schema: { $ref: '#/definitions/ErrorResponse' } }
    delete:
      tags: [Usuarios]
      summary: Eliminar usuario por ID
      operationId: users_delete   # minúsculas
      parameters:
        - name: id_usuario
          in: path
          required: true
          type: integer
          format: int32
      responses:
        '200': { description: OK usuario Eliminado, schema: { $ref: '#/definitions/MensajeConfirmacion' } }
        '204': { description: Usuario eliminado correctamente (Respuesta sin Contenido) }
        '400': { description: id_usuario inválido, schema: { $ref: '#/definitions/ErrorResponse' } }
        '401': { description: No autorizado, schema: { $ref: '#/definitions/ErrorResponse' } }
        '404': { description: Usuario  no encontrado, schema: { $ref: '#/definitions/ErrorResponse' } }
        '500': { description: Error creando o actualizando usuario, schema: { $ref: '#/definitions/ErrorResponse' } }
    put:
      tags: [Usuarios]
      summary: Actualizar usuario
      operationId: users_update   # minúsculas
      parameters:
        - in: path
          name: id_usuario
          required: true
          type: integer
          format: int32
        - in: body
          name: body
          required: true
          schema: { $ref: '#/definitions/UserUpdate' }
      responses:
        '200': { description: OK, schema: { $ref: '#/definitions/User' } }  # User actualizado
        '400': { description: Datos inválidos, schema: { $ref: '#/definitions/ErrorResponse' } }
        '401': { description: No autorizado, schema: { $ref: '#/definitions/ErrorResponse' } }
        '404': { description: Usuario  no encontrado, schema: { $ref: '#/definitions/ErrorResponse' } }
        '409': { description: Email ya existente, schema: { $ref: '#/definitions/ErrorResponse' } }
        '500': { description: Error creando o actualizando usuario, schema: { $ref: '#/definitions/ErrorResponse' } }

  /api/votos:
    post:
      tags: [Votos]
      summary: Registrar voto
      operationId: votos_insertVoto
      parameters:
        - in: body
          name: body
          required: true
          schema: { $ref: '#/definitions/VotoInsert' }
      responses:
        '201': { description: OK - Voto registrado, schema: { $ref: '#/definitions/VotoConfirmacion' } }
        '400': { description: Datos inválidos, schema: { $ref: '#/definitions/ErrorResponse' } }
        '401': { description: No autorizado, schema: { $ref: '#/definitions/ErrorResponse' } }
        '500': { description: Error creando voto, schema: { $ref: '#/definitions/ErrorResponse' } }

  /api/votos/usuario/{id_votante}:
    get:
      tags: [Votos]
      summary: Listar votos por usuario
      operationId: votos_getResumenUsuario
      parameters:
        - in: path
          name: id_votante
          required: true
          type: integer
          format: int32
      responses:
        '200':
          description: Listado de Votos registrados por usuario
          schema:
            type: array
            items: { $ref: '#/definitions/VotoConfirmacion' }
        '400': { description: id_votante inválido, schema: { $ref: '#/definitions/ErrorResponse' } }
        '401': { description: No  autorizado, schema: { $ref: '#/definitions/ErrorResponse' } }
        '404': { description: El usuario no tiene votos, schema: { $ref: '#/definitions/ErrorResponse' } }
        '500': { description: Error consultando votos, schema: { $ref: '#/definitions/ErrorResponse' } }

definitions:
  User:
    type: object
    properties:
      id_usuario: { type: integer, format: int32 }
      nombres:    { type: string }
      apellidos:  { type: string }
      email:      { type: string }
      telefono:   { type: string }
    required: [id_usuario, nombres, apellidos, email, telefono]

  UserUpdate:
    type: object
    properties:
      nombres:   { type: string }
      apellidos: { type: string }
      email:     { type: string }
      telefono:  { type: string }
    required: [nombres, apellidos, email, telefono]

  Producto:
    type: object
    properties:
      nombre:   { type: string }
      foto:     { type: string }
      votacion: { type: integer, format: int32 }
    required: [nombre, foto, votacion]

  ProductoId:
    type: object
    properties:
      id_producto: { type: integer, format: int32 }
      nombre:      { type: string }
      foto:        { type: string }
      votacion:    { type: integer, format: int32 }
    required: [id_producto, nombre, foto, votacion]

  VotoInsert:
    type: object
    required: [id_producto, id_votante]
    properties:
      id_producto: { type: integer, format: int32 }
      id_votante:  { type: integer, format: int32 }

  VotoConfirmacion:
    type: object
    required: [id_voto, id_producto, id_votante, fecha_voto]
    properties:
      id_voto:     { type: integer, format: int32 }
      id_producto: { type: integer, format: int32 }
      id_votante:  { type: integer, format: int32 }
      fecha_voto:  { type: string }

  ErrorResponse:
    type: object
    properties:
      error:   { type: string }
      message: { type: string }

  MensajeConfirmacion:
    type: object
    properties:
      message: { type: string }
      dato:    { type: string }

parameters: {}
responses: {}

security:
  - api_key: []

tags:
  - name: Salud
    description: Verificación de servicio
  - name: Usuarios
    description: Operaciones sobre cliente_usuario
  - name: Productos
    description: Operaciones sobre productos
  - name: Votos
    description: Operaciones de registro y consulta de votos

securityDefinitions:
  api_key:
    type: apiKey
    in: header
    name: x-api-key